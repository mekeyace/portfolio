<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인 페이지</title>
</head>
<body>
	<form id="frm" onsubmit="return abc()">
		아이디 : <input type="text" name="mid"><br> 패스워드 : <input
			type="password" name="mpass"><br>
		<button type="submit">로그인</button>
	</form>
</body>
<script>
/*
loginok.do post전송
아이디 입력하세요, 패스워드를 입력하세요
*/
function abc(){
	if(frm.mid.value==""){
		alert("아이디를 입력하세요");
		return false;
	}
	else if(frm.mpass.value==""){
		alert("패스워드를 입력하세요");
		return false;
	}
	else {
		frm.method="post";
		frm.action="./loginok.do";
		return;
	}
	
}

</script>

</html>
